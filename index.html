<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kakobuy Finds</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== 全局重置 & 红黑主题 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0d0d0d;
            color: #e5e5e5;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 1280px;
            width: 100%;
        }

        /* ===== 顶部导航栏 ===== */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 20px 0;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e63946;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #ffffff;
        }

        .online-badge {
            background: #1a1a1a;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #b0b0b0;
        }

        .online-badge .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .online-badge .num {
            color: #ffffff;
            font-weight: 600;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-right a {
            color: #b0b0b0;
            font-size: 1.2rem;
            transition: color 0.2s;
            text-decoration: none;
        }

        .nav-right a:hover {
            color: #e63946;
        }

        .nav-right .btn-guide {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #e5e5e5;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .nav-right .btn-guide:hover {
            border-color: #e63946;
            color: #e63946;
        }

        /* ===== 顶部横幅 ===== */
        .banner {
            background: linear-gradient(135deg, #1a0a0a 0%, #2d0a0a 50%, #0d0d0d 100%);
            border: 1px solid #2a1a1a;
            border-radius: 28px;
            padding: 28px 32px;
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(230, 57, 70, 0.08);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .banner-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .banner-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
        }

        .banner-title .highlight {
            color: #e63946;
        }

        .banner-sub {
            font-size: 0.95rem;
            opacity: 0.7;
            font-weight: 400;
        }

        .banner-codes {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 6px;
        }

        .code-badge {
            background: rgba(230, 57, 70, 0.15);
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(230, 57, 70, 0.25);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #e5e5e5;
        }

        .code-badge strong {
            font-weight: 700;
            color: #e63946;
        }

        .code-badge .copy-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
            transition: color 0.2s;
            padding: 0 4px;
        }

        .code-badge .copy-btn:hover {
            color: #e63946;
        }

        /* ===== 搜索与分类 ===== */
        .search-wrapper {
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
            color: #e5e5e5;
            display: block;
        }

        .search-box::placeholder {
            color: #666;
        }

        .search-box:focus {
            border-color: #e63946;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
        }

        /* ===== 价格筛选区域 ===== */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px 30px;
            background: #141414;
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid #222;
            margin-bottom: 24px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: #999;
            font-weight: 500;
        }

        .filter-group input[type="number"] {
            width: 80px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #e5e5e5;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .filter-group input[type="number"]:focus {
            border-color: #e63946;
        }

        .filter-group .price-range-text {
            color: #888;
            font-size: 0.85rem;
        }

        .filter-group .btn-filter {
            background: #e63946;
            border: none;
            color: #fff;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-group .btn-filter:hover {
            background: #c62836;
            transform: scale(1.02);
        }

        .filter-group .btn-reset {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #999;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-group .btn-reset:hover {
            border-color: #e63946;
            color: #e5e5e5;
        }

        /* ===== 分类导航 ===== */
        .category-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-bottom: 28px;
            padding-bottom: 8px;
            border-bottom: 1px solid #222;
        }

        .category-btn {
            background: transparent;
            border: none;
            padding: 6px 4px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            transition: 0.15s;
            border-bottom: 2px solid transparent;
        }

        .category-btn:hover {
            color: #e5e5e5;
        }

        .category-btn.active {
            color: #e63946;
            border-bottom-color: #e63946;
        }

        /* ===== 商品网格 ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: #141414;
            border-radius: 20px;
            padding: 18px 18px 22px;
            transition: 0.25s ease;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: #e63946;
            box-shadow: 0 12px 32px rgba(230, 57, 70, 0.06);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 12px;
            background: #1a1a1a;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .product-name a {
            color: #e5e5e5;
            text-decoration: none;
            transition: color 0.15s;
        }

        .product-name a:hover {
            color: #e63946;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e63946;
            margin: 6px 0 14px;
        }

        .product-link-btn {
            margin-top: auto;
            background: #1a1a1a;
            border-radius: 40px;
            padding: 10px 16px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
            border: 1px solid #2a2a2a;
        }

        .product-link-btn a {
            color: #e5e5e5;
            text-decoration: none;
            display: block;
            width: 100%;
        }

        .product-link-btn:hover {
            background: #e63946;
            border-color: #e63946;
        }

        .product-link-btn:hover a {
            color: #fff;
        }

        /* ===== 无结果提示 ===== */
        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: #666;
            font-size: 1.05rem;
            background: #141414;
            border-radius: 28px;
            border: 1px dashed #222;
        }

        .loading-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: #666;
            font-size: 1.05rem;
        }

        .error-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: #e63946;
            font-size: 1.05rem;
            background: #1a0a0a;
            border-radius: 28px;
            border: 1px solid #2a1a1a;
        }

        /* ===== 模态弹窗 (引导注册) ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeIn 0.35s ease;
        }

        .modal-overlay.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-card {
            background: #141414;
            border: 1px solid #2a1a1a;
            border-radius: 32px;
            padding: 48px 40px 40px;
            max-width: 480px;
            width: 92%;
            text-align: center;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .modal-card .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: #666;
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-card .close-btn:hover {
            color: #e63946;
        }

        .modal-card .icon-big {
            font-size: 3.2rem;
            color: #e63946;
            margin-bottom: 12px;
        }

        .modal-card h2 {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-card p {
            color: #999;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .modal-card .coupon-display {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .modal-card .coupon-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e5e5e5;
            font-size: 0.95rem;
        }

        .modal-card .coupon-item strong {
            color: #e63946;
            font-weight: 700;
        }

        .modal-card .coupon-item .copy-mini {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .modal-card .coupon-item .copy-mini:hover {
            color: #e63946;
        }

        .modal-card .btn-register {
            display: inline-block;
            background: #e63946;
            color: #fff;
            padding: 14px 40px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: 0.25s;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .modal-card .btn-register:hover {
            background: #c62836;
            transform: scale(1.02);
        }

        .modal-card .skip-link {
            display: inline-block;
            margin-top: 16px;
            color: #555;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .modal-card .skip-link:hover {
            color: #999;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .banner {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
                padding: 22px 24px;
            }
            .banner-title {
                font-size: 1.3rem;
            }
            .banner-codes {
                width: 100%;
            }
            .search-box {
                max-width: 100%;
            }
            .product-grid {
                grid-template-columns: 1fr 1fr;
            }
            .top-nav {
                flex-direction: column;
                align-items: flex-start;
            }
            .nav-right {
                width: 100%;
                justify-content: flex-start;
                flex-wrap: wrap;
            }
            .filter-section {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .filter-group {
                flex-wrap: wrap;
                justify-content: center;
            }
            .modal-card {
                padding: 32px 24px 28px;
            }
        }

        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
            .banner-codes {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 引导注册弹窗 ===== -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-card">
            <button class="close-btn" id="closeModalBtn" aria-label="关闭弹窗">
                <i class="fas fa-times"></i>
            </button>
            <div class="icon-big">
                <i class="fas fa-gift"></i>
            </div>
            <h2>🎁 注册立享 $450 优惠券</h2>
            <p>快速注册 · 全站通用 · 立即使用</p>

            <div class="coupon-display">
                <span class="coupon-item">
                    <strong id="modalCoupon1">PICKLE</strong> <span id="modalDiscount1">$15 off</span>
                    <button class="copy-mini" data-copy="PICKLE" title="复制优惠码">
                        <i class="far fa-copy"></i>
                    </button>
                </span>
                <span class="coupon-item">
                    <strong id="modalCoupon2">PICKLE20</strong> <span id="modalDiscount2">20% off</span>
                    <button class="copy-mini" data-copy="PICKLE20" title="复制优惠码">
                        <i class="far fa-copy"></i>
                    </button>
                </span>
            </div>

            <a href="https://ikako.vip/r/wptgu" target="_blank" class="btn-register" id="registerBtn">
                立即注册 <i class="fas fa-arrow-right" style="margin-left:8px;"></i>
            </a>
            <a href="#" class="skip-link" id="skipModalBtn">稍后再说</a>
        </div>
    </div>

    <div class="container">

        <!-- ===== 顶部导航栏 ===== -->
        <header class="top-nav">
            <div class="nav-left">
                <div class="logo">Kakobuy <span>Finds</span></div>
                <div class="online-badge">
                    <span class="dot"></span>
                    在线 <span class="num" id="onlineCount">128</span>
                </div>
            </div>
            <div class="nav-right">
                <a href="https://discord.gg/9fmCXK4gXy" target="_blank" title="加入 Discord 社群">
                    <i class="fab fa-discord"></i>
                </a>
                <a href="#" target="_blank" title="TikTok (链接待添加)" id="tiktokLink">
                    <i class="fab fa-tiktok"></i>
                </a>
                <a href="#" class="btn-guide" id="guideBtn">
                    <i class="fas fa-book-open" style="margin-right:6px;"></i>购买指南
                </a>
            </div>
        </header>

        <!-- ===== 顶部横幅 ===== -->
        <div class="banner">
            <div class="banner-left">
                <div class="banner-title">
                    注册立享 <span class="highlight">$450</span> 优惠券
                </div>
                <div class="banner-sub">新用户专享 · 限时福利 · 全站通用</div>
            </div>
            <div class="banner-codes">
                <span class="code-badge">
                    🎟️ <strong id="bannerCoupon1">PICKLE</strong> &nbsp; <span id="bannerDiscount1">$15 off</span>
                    <button class="copy-btn" data-copy="PICKLE" title="复制优惠码">
                        <i class="far fa-copy"></i>
                    </button>
                </span>
                <span class="code-badge">
                    🎟️ <strong id="bannerCoupon2">PICKLE20</strong> &nbsp; <span id="bannerDiscount2">20% off</span>
                    <button class="copy-btn" data-copy="PICKLE20" title="复制优惠码">
                        <i class="far fa-copy"></i>
                    </button>
                </span>
            </div>
        </div>

        <!-- ===== 搜索框 ===== -->
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜索商品名称…" />
        </div>

        <!-- ===== 价格筛选区域 ===== -->
        <div class="filter-section">
            <div class="filter-group">
                <label for="minPrice">价格范围</label>
                <input type="number" id="minPrice" placeholder="最低" min="0" step="0.01" />
                <span class="price-range-text">—</span>
                <input type="number" id="maxPrice" placeholder="最高" min="0" step="0.01" />
                <button class="btn-filter" id="applyPriceFilter">筛选</button>
                <button class="btn-reset" id="resetPriceFilter">重置</button>
            </div>
        </div>

        <!-- ===== 分类导航 ===== -->
        <nav class="category-nav" id="categoryNav">
            <button class="category-btn active" data-category="all">ALL</button>
            <button class="category-btn" data-category="shoes">SHOES</button>
            <button class="category-btn" data-category="shorts">SHORTS</button>
            <button class="category-btn" data-category="pants">PANTS</button>
            <button class="category-btn" data-category="shirts">SHIRTS</button>
            <button class="category-btn" data-category="hoodies">HOODIES</button>
            <button class="category-btn" data-category="accessories">ACCESSORIES</button>
            <button class="category-btn" data-category="jackets">JACKETS</button>
            <button class="category-btn" data-category="other">OTHER</button>
        </nav>

        <!-- ===== 商品列表 ===== -->
        <div class="product-grid" id="productGrid">
            <div class="loading-message">⏳ 加载商品中...</div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. 博主配置映射（核心：在这里添加博主）
        // ============================================================
        const BLOGGER_CONFIG = {
            // 默认配置（当未提供 ref 或未匹配时使用）
            'default': {
                affcode: 'wptgu',
                coupon1: 'PICKLE',
                coupon2: 'PICKLE20',
                discount1: '$15 off',
                discount2: '20% off'
            },
            // ============================================================
            // 👇 在这里添加你的博主配置
            // 格式：'ref值': { affcode: '对应的affcode', coupon1: '优惠券1', coupon2: '优惠券2', discount1: '说明1', discount2: '说明2' }
            // ============================================================
            'blogger_a': {
                affcode: 'blogger_a',
                coupon1: 'a15',
                coupon2: 'a20',
                discount1: '$15 off',
                discount2: '20% off'
            },
            'blogger_b': {
                affcode: 'blogger_b',
                coupon1: 'xxb15',
                coupon2: 'xxb20',
                discount1: '$15 off',
                discount2: '20% off'
            },
            'blogger_d': {
                affcode: 'blogger_d',
                coupon1: 'd15',
                coupon2: 'd20',
                discount1: '$15 off',
                discount2: '20% off'
            }
            // 需要更多博主？按相同格式继续添加即可：
            // 'blogger_c': {
            //     affcode: 'blogger_c',
            //     coupon1: '任意名字1',
            //     coupon2: '任意名字2',
            //     discount1: '$15 off',
            //     discount2: '20% off'
            // }
        };

        // ============================================================
        // 2. 获取当前 ref 参数并匹配配置
        // ============================================================
        function getRefParam() {
            const url = new URL(window.location.href);
            return url.searchParams.get('ref') || 'default';
        }

        const currentRef = getRefParam();
        const config = BLOGGER_CONFIG[currentRef] || BLOGGER_CONFIG['default'];
        const affcode = config.affcode;

        // ============================================================
        // 3. 工具函数：替换 URL 中的 affcode 参数
        // ============================================================
        function replaceAffcode(url, newAffcode) {
            try {
                const urlObj = new URL(url);
                urlObj.searchParams.set('affcode', newAffcode);
                return urlObj.toString();
            } catch (e) {
                // 如果URL解析失败（比如是相对路径），尝试直接替换字符串
                return url.replace(/affcode=[^&]*/g, 'affcode=' + newAffcode);
            }
        }

        // ============================================================
        // 4. 更新页面上的优惠券显示
        // ============================================================
        function updateCouponDisplay() {
            // 横幅
            document.getElementById('bannerCoupon1').textContent = config.coupon1;
            document.getElementById('bannerCoupon2').textContent = config.coupon2;
            document.getElementById('bannerDiscount1').textContent = config.discount1;
            document.getElementById('bannerDiscount2').textContent = config.discount2;

            // 弹窗
            document.getElementById('modalCoupon1').textContent = config.coupon1;
            document.getElementById('modalCoupon2').textContent = config.coupon2;
            document.getElementById('modalDiscount1').textContent = config.discount1;
            document.getElementById('modalDiscount2').textContent = config.discount2;

            // 更新复制按钮的 data-copy 属性
            const copyBtns = document.querySelectorAll('.copy-btn, .copy-mini');
            if (copyBtns.length >= 2) {
                copyBtns[0].dataset.copy = config.coupon1;
                copyBtns[1].dataset.copy = config.coupon2;
            }
        }

        // ============================================================
        // 5. 修改注册链接中的 affcode
        // ============================================================
        const registerBtn = document.getElementById('registerBtn');
        const baseRegisterUrl = 'https://ikako.vip/r/wptgu';
        registerBtn.href = replaceAffcode(baseRegisterUrl, affcode);

        // ============================================================
        // 6. 商品数据加载与渲染
        // ============================================================
        const API_URL = 'https://api.sheetbest.com/sheets/00b0c402-9dba-493d-9b8e-3add2c84360d';
        const grid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const minPriceInput = document.getElementById('minPrice');
        const maxPriceInput = document.getElementById('maxPrice');
        const applyPriceBtn = document.getElementById('applyPriceFilter');
        const resetPriceBtn = document.getElementById('resetPriceFilter');

        let allProducts = [];
        let currentCategory = 'all';
        let currentKeyword = '';
        let isLoading = true;
        let priceMin = null;
        let priceMax = null;

        function renderProducts() {
            const filtered = allProducts.filter(product => {
                const categoryMatch = currentCategory === 'all' || product.category === currentCategory;
                const keywordMatch = product.name.toLowerCase().includes(currentKeyword.toLowerCase());
                const price = parseFloat(product.price);
                let priceMatch = true;
                if (priceMin !== null && price < priceMin) priceMatch = false;
                if (priceMax !== null && price > priceMax) priceMatch = false;
                return categoryMatch && keywordMatch && priceMatch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-result">😕 没有找到匹配的商品</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const productLink = replaceAffcode(p.link, affcode);
                return `
                    <div class="product-card">
                        ${p.image ? `<img class="product-image" src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'" />` : ''}
                        <div class="product-name"><a href="${productLink}" target="_blank">${p.name}</a></div>
                        <div class="product-price">$${parseFloat(p.price).toFixed(2)}</div>
                        <div class="product-link-btn"><a href="${productLink}" target="_blank">Buy on KakoBuy →</a></div>
                    </div>
                `;
            }).join('');
        }

        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                if (!Array.isArray(data) || data.length === 0) {
                    grid.innerHTML = `<div class="no-result">📭 暂无商品数据</div>`;
                    isLoading = false;
                    return;
                }
                allProducts = data;
                isLoading = false;
                renderProducts();
            } catch (error) {
                grid.innerHTML = `<div class="error-message">❌ 加载失败，请检查网络</div>`;
                isLoading = false;
            }
        }

        // ============================================================
        // 7. 事件绑定
        // ============================================================
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                categoryBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                if (!isLoading) renderProducts();
            });
        });

        searchInput.addEventListener('input', function() {
            currentKeyword = this.value.trim();
            if (!isLoading) renderProducts();
        });

        applyPriceBtn.addEventListener('click', function() {
            const minVal = parseFloat(minPriceInput.value);
            const maxVal = parseFloat(maxPriceInput.value);
            priceMin = (!isNaN(minVal) && minVal >= 0) ? minVal : null;
            priceMax = (!isNaN(maxVal) && maxVal >= 0) ? maxVal : null;
            if (!isLoading) renderProducts();
        });

        resetPriceBtn.addEventListener('click', function() {
            minPriceInput.value = '';
            maxPriceInput.value = '';
            priceMin = null;
            priceMax = null;
            if (!isLoading) renderProducts();
        });

        // 复制功能
        document.querySelectorAll('.copy-btn, .copy-mini').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const code = this.dataset.copy;
                if (!code) return;
                navigator.clipboard.writeText(code).then(() => {
                    const icon = this.querySelector('i');
                    if (icon) {
                        const original = icon.className;
                        icon.className = 'fas fa-check';
                        setTimeout(() => { icon.className = original; }, 1500);
                    }
                }).catch(() => {
                    const textArea = document.createElement('textarea');
                    textArea.value = code;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                });
            });
        });

        // 弹窗控制
        const modal = document.getElementById('registerModal');
        document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.add('hidden'));
        document.getElementById('skipModalBtn').addEventListener('click', (e) => {
            e.preventDefault();
            modal.classList.add('hidden');
        });
        modal.addEventListener('click', function(e) {
            if (e.target === this) this.classList.add('hidden');
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) modal.classList.add('hidden');
        });

        // 购买指南 & TikTok
        document.getElementById('guideBtn').addEventListener('click', (e) => {
            e.preventDefault();
            alert('📖 购买指南链接待配置，请联系管理员设置。');
        });
        document.getElementById('tiktokLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('📱 TikTok 链接待配置，请联系管理员设置。');
        });

        // ============================================================
        // 8. 实时在线人数
        // ============================================================
        function updateOnlineCount() {
            document.getElementById('onlineCount').textContent = Math.floor(80 + Math.random() * 100);
        }
        updateOnlineCount();
        setInterval(updateOnlineCount, 30000);

        // ============================================================
        // 9. 启动
        // ============================================================
        updateCouponDisplay();
        loadProducts();
    </script>

</body>
</html>
